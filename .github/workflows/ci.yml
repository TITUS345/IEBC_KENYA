name: CI Build Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
        dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Backend
        run: dotnet build --no-restore --configuration Release

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: iebc-voting-system-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./iebc-voting-system-frontend
        run: npm ci

      - name: Build Next.js
        working-directory: ./iebc-voting-system-frontend
        run: npm run build
        env:
          # Provide dummy values for build-time env vars if Next.js requires them
          NEXT_PUBLIC_API_URL: http://localhost:5007
          SKIP_ENV_VALIDATION: true
